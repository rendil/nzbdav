# Docker Compose override for rclone NFS support
# This file extends your existing docker-compose.yml

services:
  nzbwebdav:
    ports:
      - "3000:3000"
      - "8080:8080"
      - "2049:2049" # rclone NFS server
    environment:
      # Enable rclone NFS
      - NFS_ENABLED=true
      - PUID=1000
      - PGID=1000
    volumes:
      - /root/nzbdav:/config
      - /data/streaming:/data/streaming # Comment out until path is configured
