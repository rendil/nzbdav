services:
  nzbwebdav:
    # Your existing nzbwebdav service
    build: .
    ports:
      - "3000:3000"
      - "8080:8080"
      # NFS ports
      - "2049:2049" # NFSv4
    environment:
      # Enable FUSE filesystem
      - FUSE_ENABLED=true
      - FUSE_MOUNT_POINT=/mnt/nzbwebdav
      - NFS_ENABLED=true
      - NFS_EXPORT_PATH=/mnt/nzbwebdav
      - PUID=1000
      - PGID=1000
    volumes:
      # Use tmpfs for FUSE mount point to avoid filesystem conflicts
      - type: tmpfs
        target: /mnt/nzbwebdav
        tmpfs:
          size: 100M
      - /root/nzbdav:/config
      - /data/streaming:/data/streaming
    privileged: true # Required for FUSE operations
    devices:
      - /dev/fuse:/dev/fuse # Required for FUSE
    cap_add:
      - SYS_ADMIN # Required for FUSE operations


