version: "3.8"

services:
  nzbwebdav:
    # Your existing nzbwebdav service
    build: .
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      # Enable FUSE filesystem
      - FUSE_ENABLED=true
      - FUSE_MOUNT_POINT=/mnt/nzbwebdav
      - PUID=1000
      - PGID=1000
    volumes:
      # Mount point for FUSE filesystem that will be shared via NFS
      - nzbwebdav-fuse:/mnt/nzbwebdav:shared
      - /root/nzbdav:/config
      - /data/streaming:/data/streaming
    privileged: true # Required for FUSE operations
    devices:
      - /dev/fuse:/dev/fuse # Required for FUSE
    cap_add:
      - SYS_ADMIN # Required for FUSE operations

  nfs-server:
    image: erichough/nfs-server
    privileged: true
    restart: unless-stopped
    ports:
      # NFSv4 only (recommended)
      - "2049:2049"
      # Uncomment below for NFSv3 support (requires more ports)
      # - "2049:2049/udp"
      # - "111:111"
      # - "111:111/udp"
      # - "32765:32765"
      # - "32765:32765/udp"
      # - "32767:32767"
      # - "32767:32767/udp"
    volumes:
      # Share the same mount point as nzbwebdav
      - nzbwebdav-fuse:/shared:ro # Read-only NFS export
      # NFS exports configuration
      - ./nfs-exports.txt:/etc/exports:ro
    environment:
      # Optional: Enable debug logging
      - NFS_LOG_LEVEL=INFO
    depends_on:
      - nzbwebdav

volumes:
  nzbwebdav-fuse:
    # Shared volume between nzbwebdav (FUSE mount) and nfs-server
    driver: local
